<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدرس الأول: تطبيق عملي على التنسيق الداخلي والمضمن</title>
    <style type="text/css">
        body {
            background-color: #f4f7f6;
            font-family: Arial, Helvetica, sans-serif;
            color: #333;
            margin: 30px;
        }
        .main-container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .title-gfg {
            color: #2c3e50;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .sub-text {
            color: #7f8c8d;
            font-size: 18px;
            line-height: 1.6;
        }
        h2, code {
            color: #c0392b;
        }
        .example-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 6px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="title-gfg">Mount Abu</div>
        <div class="sub-text">A computer science portal for Class X</div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <h2>2. التنسيق المضمن (Inline CSS)</h2>
        <p>يمكنك إضافة خصائص CSS مباشرة داخل وسم HTML باستخدام السمة <code>style</code> دون الحاجة إلى ملف CSS خارجي.</p>
        <p>مثال: <span style="color: #2980b9; font-weight: bold;">هذا نص تم تنسيقه باستخدام CSS مضمّن.</span></p>
        <div class="example-box" style="border: 1px solid #dcdcdc;">
            <p style="margin: 0; font-size: 16px;">هذا مربع يعرض كيف يمكن استخدام التنسيق المضمّن داخل العنصر نفسه.</p>
        </div>
    </div>
</body>
</html>
